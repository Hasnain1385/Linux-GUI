name: RustDesk Remote Desktop

on:
  workflow_dispatch:

jobs:
  rustdesk-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - name: Update system
      run: |
        sudo apt update
        sudo apt upgrade -y

    - name: Install desktop environment
      run: |
        sudo apt install -y xfce4 xfce4-goodies xvfb dbus-x11 wget curl

    - name: Download RustDesk
      run: |
        wget https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.deb

    - name: Install RustDesk
      run: |
        sudo apt install -y ./rustdesk-1.4.6-x86_64.deb

    - name: Configure RustDesk Server
      env:
        SERVER: ${{ secrets.RUSTDESK_SERVER }}
        RELAY: ${{ secrets.RUSTDESK_RELAY }}
        KEY: ${{ secrets.RUSTDESK_KEY }}
      run: |
        mkdir -p ~/.config/rustdesk
        echo "server=$SERVER" >> ~/.config/rustdesk/RustDesk.toml
        echo "relay=$RELAY" >> ~/.config/rustdesk/RustDesk.toml
        echo "key=$KEY" >> ~/.config/rustdesk/RustDesk.toml

    - name: Start virtual display
      run: |
        Xvfb :0 -screen 0 1920x1080x24 &
        echo "DISPLAY=:0" >> $GITHUB_ENV

    - name: Start XFCE Desktop
      run: |
        export DISPLAY=:0
        startxfce4 &

    - name: Launch RustDesk
      run: |
        export DISPLAY=:0
        rustdesk &

    - name: Keep runner alive
      run: |
        echo "Runner is ready for RustDesk connection"
        while true; do
          sleep 300
        done
