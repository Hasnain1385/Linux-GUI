name: RustDesk Remote Desktop

on:
  workflow_dispatch:

jobs:
  rustdesk:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - name: Update system
      run: sudo apt update

    - name: Install desktop packages
      run: |
        sudo apt install -y xfce4 xfce4-goodies xvfb dbus-x11 wget

    - name: Download RustDesk
      run: |
        wget https://github.com/rustdesk/rustdesk/releases/download/1.4.6/rustdesk-1.4.6-x86_64.deb

    - name: Install RustDesk
      run: |
        sudo apt install -y ./rustdesk-1.4.6-x86_64.deb

    - name: Start virtual display
      run: |
        Xvfb :0 -screen 0 1920x1080x24 &
        echo "DISPLAY=:0" >> $GITHUB_ENV
        sleep 5

    - name: Start DBus
      run: |
        dbus-launch --exit-with-session > /dev/null

    - name: Start XFCE desktop
      run: |
        export DISPLAY=:0
        startxfce4 &
        sleep 10

    - name: Launch RustDesk with your server
      env:
        SERVER: ${{ secrets.RUSTDESK_SERVER }}
        KEY: ${{ secrets.RUSTDESK_KEY }}
      run: |
        export DISPLAY=:0
        rustdesk --server $SERVER --key $KEY &

    - name: Print RustDesk ID
      run: |
        sleep 15
        rustdesk --get-id

    - name: Keep runner alive
      run: |
        echo "RustDesk runner ready"
        while true; do sleep 300; done
